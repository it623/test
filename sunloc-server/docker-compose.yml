version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sunloc-postgres
    environment:
      POSTGRES_DB: sunloc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sunloc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sunloc-network

  sunloc-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sunloc-server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sunloc
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    volumes:
      - ./public:/app/public:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sunloc-network

volumes:
  sunloc_postgres_data:
    driver: local

networks:
  sunloc-network:
    driver: bridge
